<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <header class="header auth-header">
        <button onclick="location.href='index.html'" class="back-btn">&#8592; Back</button>
        <h1>Sign Up</h1>
        <p class="auth-subtitle">Create your account and start planning your spending.</p>
    </header>

    <main class="auth-shell">
        <section class="auth-card">
            <form id="signup-form" class="auth-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Sign Up</button>
            </form>
        </section>
    </main>
<script type="module" src="/src/signup.ts"></script>
</body>
</html>
